<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniStream</title>
    <link rel="icon" type="image/png" href="/assets/omnistream.png">
    <!-- Split CSS -->
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components.css">
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="app">
        <div id="sidebar-overlay" class="sidebar-overlay"></div>
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="/assets/omnistream.png" alt="Logo" class="logo-img">
                    <span>OmniStream</span>
                </div>
                <button id="close-sidebar-btn" class="icon-btn" title="Close Sidebar"><i
                        class="fa-solid fa-xmark"></i></button>
            </div>

            <div class="sidebar-section">
                <h3><i class="fa-solid fa-circle-plus"></i> Add Stream</h3>
                <div class="control-group">
                    <div class="toggle-group" id="stream-type-toggle" style="margin-bottom: 8px;">
                        <button class="toggle-btn active" data-value="live" title="Live Streams"><i
                                class="fa-solid fa-satellite-dish"></i> Live</button>
                        <button class="toggle-btn" data-value="vod" title="VODs / Sync"><i
                                class="fa-solid fa-video"></i> VOD</button>
                    </div>
                </div>
                <div class="input-group">
                    <div class="platform-icon" id="platform-icon-container">
                        <i class="fa-brands fa-twitch" style="color: #a970ff;"></i>
                    </div>
                    <input type="text" id="stream-input" placeholder="Channel name / URL" autocomplete="off">
                    <!-- The Add button remains the same -->
                    <button id="add-stream-btn" class="purple-btn" title="Add Stream"><i
                            class="fa-solid fa-plus"></i></button>
                </div>
                <div class="input-group" id="vod-usernames-container" style="display: none; margin-top: 8px;">
                    <textarea id="vod-usernames-input" class="styled-input" rows="3"
                        placeholder="Additional Twitch usernames to sync,&#10;separate by line breaks..."
                        style="width: 100%; border-radius: 4px; padding: 6px;"></textarea>
                </div>
                <!-- VOD status/loading label -->
                <div id="vod-sync-status"
                    style="font-size: 0.85em; color: var(--accent); margin-top: 4px; display: none;"><i
                        class="fa-solid fa-spinner fa-spin"></i> Syncing VODs...</div>
                <div id="add-error" class="error-msg"></div>
            </div>

            <div class="sidebar-section">
                <div class="section-header-row">
                    <h3><i class="fa-solid fa-list-ul"></i> Active Streams</h3>
                    <div class="section-actions">
                        <button id="clear-all-btn" class="clear-all-btn" title="Clear all streams"><i
                                class="fa-solid fa-trash"></i></button>
                        <button id="save-group-btn" class="save-group-btn"
                            title="Save current Twitch streams as a group"><i class="fa-solid fa-bookmark"></i></button>
                    </div>
                </div>
                <ul id="active-streams-list" class="stream-list">
                    <!-- Stream list items rendered dynamically -->
                </ul>
                <div id="no-streams-msg" class="empty-msg">No active streams.</div>
            </div>

            <div class="sidebar-section" id="stream-groups-section">
                <h3><i class="fa-solid fa-layer-group"></i> Stream Groups</h3>
                <div id="groups-list" class="groups-list">
                    <!-- Rendered dynamically -->
                </div>
                <div id="no-groups-msg" class="empty-msg">No saved groups yet.</div>
            </div>

            <div class="sidebar-section">
                <div class="section-header-row">
                    <h3><i class="fa-solid fa-comments"></i> Chat</h3>
                    <div class="toggle-group">
                        <button id="chat-toggle-btn" class="toggle-btn" title="Show/Hide Chat"
                            style="padding: 4px 10px; gap: 6px;">
                            <i class="fa-solid fa-comment"></i> Show
                        </button>
                    </div>
                </div>
                <div class="control-group">
                    <label>Chat Source</label>
                    <select id="chat-stream-select" class="styled-select">
                        <option value="">-- Select a stream --</option>
                    </select>
                </div>
            </div>

            <div class="sidebar-section">
                <h3><i class="fa-solid fa-gear"></i> Settings &amp; Layout</h3>
                <div class="layout-controls">
                    <div class="control-group">
                        <label>Sidebar Position</label>
                        <div class="toggle-group" id="sidebar-side-toggle">
                            <button class="toggle-btn" data-value="left" title="Left Side"><i
                                    class="fa-solid fa-left-long"></i></button>
                            <button class="toggle-btn" data-value="right" title="Right Side"><i
                                    class="fa-solid fa-right-long"></i></button>
                        </div>
                    </div>
                    <div class="control-group">
                        <label>Stream Alignment</label>
                        <div class="toggle-group" id="alignment-toggle">
                            <button class="toggle-btn" data-value="left" title="Align Left"><i
                                    class="fa-solid fa-align-left"></i></button>
                            <button class="toggle-btn" data-value="center" title="Align Center"><i
                                    class="fa-solid fa-align-center"></i></button>
                            <button class="toggle-btn" data-value="right" title="Align Right"><i
                                    class="fa-solid fa-align-right"></i></button>
                        </div>
                    </div>
                    <div class="control-group">
                        <label>Focus Mode Layout</label>
                        <div class="toggle-group" id="focused-mode-toggle">
                            <button class="toggle-btn" data-value="bottom" title="Grid at Bottom">
                                <svg class="toggle-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="3" width="20" height="10" rx="2" />
                                    <rect x="2" y="17" width="4" height="4" rx="1" />
                                    <rect x="10" y="17" width="4" height="4" rx="1" />
                                    <rect x="18" y="17" width="4" height="4" rx="1" />
                                </svg>
                            </button>
                            <button class="toggle-btn" data-value="top" title="Grid at Top">
                                <svg class="toggle-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="3" width="4" height="4" rx="1" />
                                    <rect x="10" y="3" width="4" height="4" rx="1" />
                                    <rect x="18" y="3" width="4" height="4" rx="1" />
                                    <rect x="2" y="11" width="20" height="10" rx="2" />
                                </svg>
                            </button>
                            <button class="toggle-btn" data-value="left" title="Grid at Left">
                                <svg class="toggle-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="2" width="4" height="4" rx="1" />
                                    <rect x="2" y="10" width="4" height="4" rx="1" />
                                    <rect x="2" y="18" width="4" height="4" rx="1" />
                                    <rect x="10" y="2" width="12" height="20" rx="2" />
                                </svg>
                            </button>
                            <button class="toggle-btn" data-value="right" title="Grid at Right">
                                <svg class="toggle-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="2" y="2" width="12" height="20" rx="2" />
                                    <rect x="18" y="2" width="4" height="4" rx="1" />
                                    <rect x="18" y="10" width="4" height="4" rx="1" />
                                    <rect x="18" y="18" width="4" height="4" rx="1" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="control-group" id="grid-size-group" style="display: none;">
                        <label>Resize Focused Stream: <span id="grid-size-value">25</span>%</label>
                        <input type="range" id="grid-size-slider" class="styled-slider" min="10" max="90" value="25">
                    </div>
                </div>
            </div>
        </aside>

        <main id="main-content" class="main-content">
            <div id="floating-controls" class="floating-controls">
                <button id="open-sidebar-btn" class="float-btn" title="Open Settings"><i
                        class="fa-solid fa-sliders"></i></button>
                <button id="fullscreen-btn" class="float-btn" title="Toggle Fullscreen">
                    <i class="fa-solid fa-expand"></i>
                </button>
                <button id="pause-all-btn" class="float-btn" title="Pause/Unpause all streams">
                    <i class="fa-solid fa-pause"></i>
                </button>
                <button id="sync-vods-btn" class="float-btn" title="Sync VODs" style="display: none;">
                    <i class="fa-solid fa-arrows-rotate"></i>
                </button>
            </div>
            <div id="content-area" class="content-area">
                <div id="streams-container" class="streams-container">
                    <!-- Iframes inserted here -->
                </div>
                <div id="chat-panel" class="chat-panel" style="display:none;">
                    <div class="chat-panel-header">
                        <span id="chat-panel-label"><i class="fa-solid fa-comment"></i> Chat</span>
                        <button id="chat-close-btn" class="icon-btn" title="Hide Chat"><i
                                class="fa-solid fa-xmark"></i></button>
                    </div>
                    <iframe id="chat-iframe" src="" allowfullscreen></iframe>
                </div>
            </div>
        </main>
    </div>

    <!-- Notification Center -->
    <div id="notification-center"
        style="position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 12px; z-index: 1000; pointer-events: none;">
    </div>

    <!-- Save Group Modal -->
    <div id="save-group-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h2 class="modal-title"><i class="fa-solid fa-bookmark"></i> Save Stream Group</h2>
            <div class="modal-disclaimer">
                <i class="fa-solid fa-circle-info"></i>
                Only <strong>Twitch</strong> streams are saved in a group.
            </div>
            <label class="modal-label" for="group-name-input">Group Name</label>
            <input type="text" id="group-name-input" class="modal-input" autocomplete="off" maxlength="40">
            <div id="group-name-error" class="error-msg"></div>
            <div class="modal-actions">
                <button id="modal-cancel-btn" class="modal-btn modal-btn-cancel">Cancel</button>
                <button id="modal-save-btn" class="modal-btn modal-btn-save">Save Group</button>
            </div>
        </div>
    </div>

    <!-- Twitch Embed SDK must load before main.js so `Twitch` is available globally -->
    <script src="https://embed.twitch.tv/embed/v1.js"></script>
    <!-- ES Module entry point — replaces the old script.js -->
    <script type="module" src="/js/main.js"></script>
</body>

</html>
