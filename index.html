<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniStream</title>
    <link rel="icon" type="image/png" href="omnistream.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div id="app">
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <img src="omnistream.png" alt="Logo" class="logo-img">
                    <span>OmniStream</span>
                </div>
                <button id="close-sidebar-btn" class="icon-btn" title="Close Sidebar"><i
                        class="fa-solid fa-xmark"></i></button>
            </div>

            <div class="sidebar-section">
                <h3><i class="fa-solid fa-circle-plus"></i> Add Stream</h3>
                <div class="input-group">
                    <div class="platform-icon" id="platform-icon-container">
                        <i class="fa-brands fa-twitch" style="color: #a970ff;"></i>
                    </div>
                    <input type="text" id="stream-input" placeholder="Channel name / URL" autocomplete="off">
                    <button id="add-stream-btn" class="purple-btn" title="Add Stream"><i
                            class="fa-solid fa-plus"></i></button>
                </div>
                <div id="add-error" class="error-msg"></div>
            </div>



            <div class="sidebar-section">
                <div class="section-header-row">
                    <h3><i class="fa-brands fa-twitch" style="color:#a970ff;"></i><i class="fa-brands fa-youtube"
                            style="color:#ff0000;margin-left:5px;"></i>&nbsp;Chat</h3>
                    <button id="chat-toggle-btn" class="chat-toggle-btn" title="Show/Hide Chat">
                        <i class="fa-solid fa-comment"></i> Show
                    </button>
                </div>
                <div class="control-group">
                    <label>Chat Source</label>
                    <select id="chat-stream-select">
                        <option value="">-- Select a stream --</option>
                    </select>
                </div>
            </div>

            <div class="sidebar-section">
                <h3><i class="fa-solid fa-gear"></i> Settings & Layout</h3>
                <div class="layout-controls">
                    <div class="control-group">
                        <label>Sidebar Position</label>
                        <select id="sidebar-side-select">
                            <option value="left">Left Side</option>
                            <option value="right">Right Side</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>Stream Alignment</label>
                        <select id="alignment-select">
                            <option value="left">Left</option>
                            <option value="center">Center</option>
                            <option value="right">Right</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>Focus Mode Layout</label>
                        <select id="focused-mode-select">
                            <option value="top">Top</option>
                            <option value="bottom">Bottom</option>
                            <option value="left">Left</option>
                            <option value="right">Right</option>
                        </select>
                    </div>
                    <div class="control-group" id="grid-size-group" style="display: none;">
                        <label>Resize Focused Stream: <span id="grid-size-value">25</span>%</label>
                        <input type="range" id="grid-size-slider" class="styled-slider" min="10" max="90" value="25">
                    </div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-header-row">
                    <h3><i class="fa-solid fa-list-ul"></i> Active Streams</h3>
                    <div class="section-actions">
                        <button id="clear-all-btn" class="clear-all-btn" title="Clear all streams"><i
                                class="fa-solid fa-trash"></i></button>
                        <button id="save-group-btn" class="save-group-btn"
                            title="Save current Twitch streams as a group"><i class="fa-solid fa-bookmark"></i></button>
                    </div>
                </div>
                <ul id="active-streams-list" class="stream-list">
                    <!-- Stream list items rendered dynamically -->
                </ul>
                <div id="no-streams-msg" class="empty-msg">No active streams.</div>
            </div>

            <div class="sidebar-section" id="stream-groups-section">
                <h3><i class="fa-solid fa-layer-group"></i> Stream Groups</h3>
                <div id="groups-list" class="groups-list">
                    <!-- Rendered dynamically -->
                </div>
                <div id="no-groups-msg" class="empty-msg">No saved groups yet.</div>
            </div>
        </aside>

        <main id="main-content" class="main-content">
            <div id="floating-controls" class="floating-controls">
                <button id="open-sidebar-btn" class="float-btn" title="Open Settings"><i
                        class="fa-solid fa-sliders"></i></button>
                <button id="fullscreen-btn" class="float-btn" title="Toggle Fullscreen">
                    <i class="fa-solid fa-expand"></i>
                </button>
                <button id="pause-all-btn" class="float-btn" title="Pause/Unpause all streams">
                    <i class="fa-solid fa-pause"></i>
                </button>
            </div>
            <div id="content-area" class="content-area">
                <div id="streams-container" class="streams-container">
                    <!-- Iframes inserted here -->
                </div>
                <div id="chat-panel" class="chat-panel" style="display:none;">
                    <div class="chat-panel-header">
                        <span id="chat-panel-label"><i class="fa-solid fa-comment"></i> Chat</span>
                        <button id="chat-close-btn" class="icon-btn" title="Hide Chat"><i
                                class="fa-solid fa-xmark"></i></button>
                    </div>
                    <iframe id="chat-iframe" src="" allowfullscreen></iframe>
                </div>
            </div>
        </main>
    </div>

    <!-- Save Group Modal -->
    <div id="save-group-modal" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <h2 class="modal-title"><i class="fa-solid fa-bookmark"></i> Save Stream Group</h2>
            <div class="modal-disclaimer">
                <i class="fa-solid fa-circle-info"></i>
                Only <strong>Twitch</strong> streams are saved in a group. YouTube streams are excluded.
            </div>
            <label class="modal-label" for="group-name-input">Group Name</label>
            <input type="text" id="group-name-input" class="modal-input" placeholder="e.g. Gaming Night"
                autocomplete="off" maxlength="40">
            <div id="group-name-error" class="error-msg"></div>
            <div class="modal-actions">
                <button id="modal-cancel-btn" class="modal-btn modal-btn-cancel">Cancel</button>
                <button id="modal-save-btn" class="modal-btn modal-btn-save">Save Group</button>
            </div>
        </div>
    </div>

    <script src="https://embed.twitch.tv/embed/v1.js"></script>
    <script src="script.js"></script>
</body>

</html>
